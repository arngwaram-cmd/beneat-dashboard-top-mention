name: Update Mention Dashboard

on:
  schedule:
    - cron: '0 2 * * *'   # 09:00 น. เวลาไทย (UTC+7 → UTC 02:00)
    - cron: '0 8 * * *'   # 15:00 น. เวลาไทย (UTC+7 → UTC 08:00)
  workflow_dispatch:        # รันมือได้ทุกเมื่อ

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Generate dashboard HTML
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: python generate_dashboard.py

      - name: Commit & push updated dashboard
        run: |
          git config user.name "BeNeat Bot"
          git config user.email "bot@beneat.co"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-refresh dashboard $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M')"
          git push
